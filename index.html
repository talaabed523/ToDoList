<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <title>To-Do List</title>
        <link rel = "stylesheet" href = "style.css"/>
    </head>
    <body>
        <div id = "todo-container">
            <div id = "header">
                <h1>To Do List</h1>
            </div>

            <div id = "todo-form">
                <input type="text" class="input-item" name="input_box" id="input-box" placeholder="Add Task">
                <button id="input-button" onclick="addTask()">Add</button>
            </div>
            
            <div id="task-area">
                <h2 id="task-title">Task List</h2>
                <ul id="list-container"></ul>
                <p id="all-complete-message" style="display: none; color: white;">
                    Good job! All your tasks are completed!
                </p>
            </div>

            <hr />
            <div class="task-counters">
                Completed: <span id="completed-counter">0</span> | Uncompleted: <span id = "uncompleted-counter">0</span>
                <button id="reset-btn" onclick="resetTasks()">Reset</button>
            </div>
        </div>

        <div id = "subtask-panel" style = "display:none;">
            <div id = "subtask-header">
                <span id="subtask-title">Subtasks</span>
                <span id="subtask-close" onclick="closeSubtasks()"></span>
            </div>
            <ul id="subtask-list"></ul>
            <div id="subtask-input-area">
                <input type="text" id="subtask-input" placeholder="Add subtask...">
                <button onclick="addSubtask()">Add</button>
            </div>
        </div>

        <button id = "chat-btn" onclick="toggleChat()">Ask AI</button>

        <div id = "chat-window" style = "display:none;">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Ask me anything...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

        <script type = "text/javascript" src = "script.js"></script>
    </body>
</html>
